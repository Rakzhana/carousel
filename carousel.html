<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Image Slider</title>

    <style>
        body{
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,#997BC9, #764ba2, #667eea,#6C47A6,#4F1AA1 );
            font-family: Arial, sans-serif;
            
        }

        .container{
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        img{
            width: 300px;
            height: 400px;
            object-fit: cover;
            border-radius: 12px;
            transition: transform 0.4s ease;
        }

        img:hover{
            transform: scale(1.05);
        }

        .buttons{
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button{
            padding: 10px 25px;
            border: none;
            border-radius: 25px;
            background: #764ba2;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover{
            background: #5a3a87;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>

    <div class="container">
        <img id="slider" src="" alt="bannerimages"/>

        <!-- Buttons moved inside this div -->
        <div class="buttons">
            <button onclick="prevpic()">Prev</button>
            <button onclick="changepic()">Next</button>
        </div>
    </div>

    <script>
        let imagecount = 0;

        let images = [
            "https://i.pinimg.com/1200x/6d/27/0c/6d270c5961d575b31e79488869e9f363.jpg",
            "https://i.pinimg.com/736x/ad/c8/65/adc8657f7d5546c444488a870b2ad203.jpg",
            "https://i.pinimg.com/736x/1d/bd/c9/1dbdc9f627bdab27caf306ef8fd285c0.jpg",
            "https://i.pinimg.com/736x/0b/5e/b4/0b5eb439a0fe2c71aa7b427d3402e1ea.jpg",
            "https://i.pinimg.com/736x/01/b4/ec/01b4ecb877a8dc40208353b38d9311d2.jpg",
            "https://i.pinimg.com/736x/77/98/5f/77985f67182ef4518ce2792d4bd610c9.jpg",
            "https://i.pinimg.com/1200x/73/e7/ff/73e7ff9043ff44cb36c2a52c2804aa50.jpg",
            "https://i.pinimg.com/736x/03/c6/03/03c603057fafb14d8032d3dd70b9c2d6.jpg",
            "https://i.pinimg.com/1200x/bb/58/04/bb580461b29d28e2dea9ef033c6f4c99.jpg",
            "https://i.pinimg.com/736x/fc/88/90/fc88902d566d8101cd6363393ed3a83d.jpg",

            "https://i.pinimg.com/736x/4f/24/99/4f2499061cca79e8d7c46b4169224792.jpg",
            "https://i.pinimg.com/736x/2c/46/7b/2c467bdce03e357a2aca0d204e5095be.jpg",

            "https://i.pinimg.com/1200x/b0/62/85/b062858d9c7e5f66f5f4d346345f1c50.jpg"
        ];

        document.getElementById("slider").src = images[imagecount];

        function changepic(){
            if (imagecount < images.length - 1){
                imagecount++;
            }
            document.getElementById("slider").src = images[imagecount];
        }

        function prevpic(){
            if (imagecount > 0){
                imagecount--;
            }
            document.getElementById("slider").src = images[imagecount];
        }
        function callback()
        {
            if(imagecount<images.length-1)
            imagecount++
        else
        {
        imagecount=0
        document.getElementById("slider").setAttribute(src = images[imagecount]);

        }
    }
        setInterval(callback,1000)
    </script>

</body>
</html>
